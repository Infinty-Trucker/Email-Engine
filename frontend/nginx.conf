server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS and re-resolve every 10s so container IP changes
    # after a rebuild don't leave nginx pointing at a stale upstream.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream "http://api:8000";

    # Proxy ALL API calls to the Django backend
    location /api/ {
        proxy_pass         $api_upstream;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 25m;
    }

    # Attachments are streamed via /api/conversations/attachments/<id>/download/
    # No /media/ route needed

    # Proxy webhook push notifications
    location /webhooks/ {
        proxy_pass         $api_upstream;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Django admin
    location /admin/ {
        proxy_pass         $api_upstream;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Django static files
    location /static/ {
        proxy_pass $api_upstream;
    }

    # React SPA — all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
